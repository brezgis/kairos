  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

group=\"meds\"><button data-val=\"yes\">Yes<\u002Fbutton><button data-val=\"no\">No<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n    <div class=\"field\" data-modes=\"s e c\"><div class=\"q\">Therapy today?<\u002Fdiv><div class=\"seg\" data-group=\"therapy\"><button data-val=\"yes\">Yes<\u002Fbutton><button data-val=\"no\">No<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n    <div class=\"field\" data-modes=\"s e c\"><div class=\"q\">Skin<\u002Fdiv><div class=\"seg\" data-group=\"acne\"><button data-val=\"clear\">Clear<\u002Fbutton><button data-val=\"afew\">A few<\u002Fbutton><button data-val=\"breakout\">Breaking out<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n    <div class=\"field\" data-modes=\"s e c\">\n      <div class=\"q\">Period flow<\u002Fdiv>\n      <div class=\"seg\" data-group=\"flow\"><button data-val=\"none\">None<\u002Fbutton><button data-val=\"spotting\">Spotting<\u002Fbutton><button data-val=\"light\">Light<\u002Fbutton><button data-val=\"medium\">Medium<\u002Fbutton><button data-val=\"heavy\">Heavy<\u002Fbutton><\u002Fdiv>\n      <div class=\"reveal\" id=\"periodReveal\">\n        <div class=\"sub\">With your period<\u002Fdiv>\n        <div class=\"seg\" data-group=\"cramps\"><button data-val=\"0\">No cramps<\u002Fbutton><button data-val=\"1\">Mild<\u002Fbutton><button data-val=\"2\">Moderate<\u002Fbutton><button data-val=\"3\">Severe<\u002Fbutton><\u002Fdiv>\n        <div class=\"seg\" data-group=\"bloating\" style=\"margin-top:10px\"><button data-val=\"yes\">Bloating<\u002Fbutton><button data-val=\"no\">No bloating<\u002Fbutton><\u002Fdiv>\n        <div class=\"seg\" data-group=\"nausea\" style=\"margin-top:10px\"><button data-val=\"none\">No nausea<\u002Fbutton><button data-val=\"mild\">Mild<\u002Fbutton><button data-val=\"bad\">Bad<\u002Fbutton><\u002Fdiv>\n        <div class=\"seg\" data-group=\"headache\" style=\"margin-top:10px\"><button data-val=\"none\">No headache<\u002Fbutton><button data-val=\"mild\">Mild<\u002Fbutton><button data-val=\"bad\">Bad<\u002Fbutton><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"field\" data-modes=\"s e c\"><div class=\"q\">Other symptoms<\u002Fdiv><div class=\"chipset\" data-group=\"symptoms\" data-multi=\"1\" id=\"symList\"><\u002Fdiv><input class=\"addchip\" id=\"symAdd\" placeholder=\"+ add symptom\"><\u002Fdiv>\n\n    <div class=\"field\" data-modes=\"e c\">\n      <div class=\"q\">Movement<\u002Fdiv>\n      <div class=\"seg\" data-group=\"exType\"><button data-val=\"none\">None<\u002Fbutton><button data-val=\"walk\">Walk<\u002Fbutton><button data-val=\"run\">Run<\u002Fbutton><button data-val=\"strength\">Strength<\u002Fbutton><button data-val=\"yoga\">Yoga<\u002Fbutton><button data-val=\"climb\">Climb<\u002Fbutton><button data-val=\"cycle\">Cycle<\u002Fbutton><button data-val=\"other\">Other<\u002Fbutton><\u002Fdiv>\n      <div class=\"ex-inline\"><input class=\"ex-num\" id=\"exMin\" type=\"number\" inputmode=\"numeric\" placeholder=\"min\"><div class=\"seg\" data-group=\"exInt\"><button data-val=\"easy\">Easy<\u002Fbutton><button data-val=\"moderate\">Moderate<\u002Fbutton><button data-val=\"hard\">Hard<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"field\" data-modes=\"e c\"><div class=\"q\">Notable moments<\u002Fdiv><div class=\"sub\">the day's events<\u002Fdiv><textarea class=\"note\" id=\"ciEvents\" placeholder=\"What happened today…\"><\u002Ftextarea><\u002Fdiv>\n\n    <div class=\"field\" data-modes=\"e c\"><div class=\"q\">Anything to log<\u002Fdiv>\n      <div class=\"ex-inline\">\n        <div><div class=\"sub\">Caffeine<\u002Fdiv><div class=\"seg\" data-group=\"caffeine\"><button data-val=\"0\">0<\u002Fbutton><button data-val=\"1\">1<\u002Fbutton><button data-val=\"2\">2<\u002Fbutton><button data-val=\"3\">3+<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n        <div><div class=\"sub\">Alcohol<\u002Fdiv><div class=\"seg\" data-group=\"alcohol\"><button data-val=\"0\">0<\u002Fbutton><button data-val=\"1\">1<\u002Fbutton><button data-val=\"2\">2<\u002Fbutton><button data-val=\"3\">3+<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"field\" data-modes=\"s e c\"><div class=\"q\" id=\"noteQ\">A note<\u002Fdiv><textarea class=\"note\" id=\"ciNote\" placeholder=\"…\"><\u002Ftextarea><\u002Fdiv>\n\n    <button class=\"submit\" id=\"ciSubmit\">—<\u002Fbutton>\n    <button class=\"submit ghost\" data-close=\"\">Later<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ SETTINGS ============ -->\n<div class=\"screen\" id=\"screen-settings\">\n  <div class=\"screen-inner\">\n    <div class=\"screen-head\"><div><div class=\"gk\">τὰ καθ’ ἡμέραν<\u002Fdiv><div class=\"screen-title\">Settings<\u002Fdiv><\u002Fdiv><button class=\"screen-x\" data-close=\"\">done<\u002Fbutton><\u002Fdiv>\n    <div class=\"set-group\">\n      <div class=\"set-h\">Today’s check-in<\u002Fdiv>\n      <button class=\"set-row\" data-cmopen=\"morning\"><span>Edit morning<\u002Fspan><span class=\"set-meta\" id=\"ciMetaM\">—<\u002Fspan><\u002Fbutton>\n      <button class=\"set-row\" data-cmopen=\"evening\"><span>Edit evening<\u002Fspan><span class=\"set-meta\" id=\"ciMetaE\">—<\u002Fspan><\u002Fbutton>\n      <button class=\"set-row\" data-cmopen=\"full\"><span>Edit the whole day<\u002Fspan><span class=\"set-meta\">all fields<\u002Fspan><\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"set-group\">\n      <div class=\"set-h\">Sources<\u002Fdiv>\n      <div id=\"srcToggles\"><\u002Fdiv>\n      <button class=\"set-row\" data-open=\"sources\"><span>Connection status<\u002Fspan><span class=\"set-meta\" id=\"srcCount\">—<\u002Fspan><\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"set-group\">\n      <div class=\"set-h\">Display<\u002Fdiv>\n      <button class=\"set-row\" id=\"toggleMotion\"><span>Ambient motion<\u002Fspan><span class=\"set-meta\" id=\"motionMeta\">on<\u002Fspan><\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ SOURCES ============ -->\n<div class=\"screen\" id=\"screen-sources\">\n  <div class=\"screen-inner\">\n    <div class=\"screen-head\"><div><div class=\"gk\">πηγαί<\u002Fdiv><div class=\"screen-title\">Sources<\u002Fdiv><\u002Fdiv><button class=\"screen-x\" data-close=\"\">done<\u002Fbutton><\u002Fdiv>\n    <div id=\"sourcesList\"><div class=\"loading\">loading…<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ DAY DETAIL ============ -->\n<div class=\"screen\" id=\"screen-day\">\n  <div class=\"screen-inner\">\n    <div class=\"screen-head\"><div><div class=\"gk\" id=\"dayGk\">—<\u002Fdiv><div class=\"screen-title\" id=\"dayTitle\">—<\u002Fdiv><\u002Fdiv><button class=\"screen-x\" data-close=\"\">close<\u002Fbutton><\u002Fdiv>\n    <div id=\"dayBody\"><div class=\"loading\">loading…<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ METRIC DETAIL ============ -->\n<div class=\"screen\" id=\"screen-metric\">\n  <div class=\"screen-inner\">\n    <div class=\"screen-head\"><div><div class=\"gk\" id=\"metGk\">—<\u002Fdiv><div class=\"screen-title\" id=\"metTitle\">—<\u002Fdiv><\u002Fdiv><button class=\"screen-x\" data-close=\"\">close<\u002Fbutton><\u002Fdiv>\n    <div class=\"metric-hero\"><div class=\"metric-big\" id=\"metBig\">—<\u002Fdiv><div class=\"metric-unit\" id=\"metUnit\"><\u002Fdiv><\u002Fdiv>\n    <div id=\"metChartWrap\"><canvas id=\"metChart\" class=\"metric-chart\"><\u002Fcanvas><\u002Fdiv>\n    <div class=\"day-grid\" id=\"metStats\"><\u002Fdiv>\n    <div class=\"day-sec\"><div class=\"h\">From your record<\u002Fdiv><div class=\"day-oracle\" id=\"metSays\">—<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ MOON DETAIL ============ -->\n<div class=\"screen\" id=\"screen-moondetail\">\n  <div class=\"screen-inner\">\n    <div class=\"screen-head\"><div><div class=\"gk\">σελήνη<\u002Fdiv><div class=\"screen-title\">The Moon<\u002Fdiv><\u002Fdiv><button class=\"screen-x\" data-close=\"\">close<\u002Fbutton><\u002Fdiv>\n    <div class=\"metric-hero\"><canvas id=\"moonCvBig\"><\u002Fcanvas><div><div class=\"metric-big\" id=\"mdName\">—<\u002Fdiv><div class=\"metric-unit\"><span id=\"mdLit\"><\u002Fspan> lit · <span id=\"mdPhase\"><\u002Fspan><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"day-grid\">\n      <div class=\"day-stat\"><div class=\"k\">Next full<\u002Fdiv><div class=\"v\" id=\"mdFull\">—<\u002Fdiv><\u002Fdiv>\n      <div class=\"day-stat\"><div class=\"k\">Next new<\u002Fdiv><div class=\"v\" id=\"mdNew\">—<\u002Fdiv><\u002Fdiv>\n      <div class=\"day-stat\"><div class=\"k\">Illumination<\u002Fdiv><div class=\"v\" id=\"mdLit2\">—<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"day-sec\"><div class=\"h\">Tonight<\u002Fdiv><div class=\"day-oracle\" id=\"mdNote\">—<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ CYCLE ============ -->\n<div class=\"screen\" id=\"screen-cycle\">\n  <div class=\"screen-inner\">\n    <div class=\"screen-head\"><div><div class=\"gk\">κύκλος<\u002Fdiv><div class=\"screen-title\">This cycle<\u002Fdiv><\u002Fdiv><button class=\"screen-x\" data-close=\"\">close<\u002Fbutton><\u002Fdiv>\n    <div id=\"cycleBody\"><div class=\"loading\">loading…<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals(){ return {}; }\n  componentWillUnmount(){ if(this._cleanup) this._cleanup(); }\n  componentDidMount(){\n    if(this._cleanup){ this._cleanup(); this._cleanup=null; }\n    const $=id=>document.getElementById(id);\n    const setText=(id,v)=>{ const el=$(id); if(el) el.textContent=(v==null||v==='')?'—':v; };\n    const esc=s=>String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));\n    const pad=n=>String(n).padStart(2,'0');\n    const keyOf=d=>d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());\n    const todayKey=keyOf(new Date());\n\n    /* ===== palette + mosaic (time/astronomy, not mock) ===== */\n    const ANCHORS=[\n      {h:0,name:'night',greek:'νύξ',pal:['#0A0F1C','#152238','#2E4A63','#4A6885'],field:{scale:.012,speed:.00050,angle:0.05}},\n      {h:4,name:'small hours',greek:'ὄρθρος',pal:['#121226','#2A2748','#5A4A6E','#8A7AA0'],field:{scale:.013,speed:.00055,angle:0.35}},\n      {h:6,name:'first light',greek:'ἠώς',pal:['#241A2E','#5E3A52','#C06A66','#F0B884'],field:{scale:.015,speed:.00072,angle:0.6}},\n      {h:9,name:'morning',greek:'πρωί',pal:['#1C2E3A','#3A6478','#88B0B0','#E8DAB0'],field:{scale:.012,speed:.00056,angle:0.3}},\n      {h:12,name:'midday',greek:'μεσημβρία',pal:['#2A4A6B','#3A6EA5','#88B6D0','#EDEAD8'],field:{scale:.011,speed:.00050,angle:0.2}},\n      {h:15,name:'afternoon',greek:'δείλη',pal:['#324E5E','#5A7C7A','#A9B48C','#EDD9A8'],field:{scale:.013,speed:.00058,angle:0.5}},\n      {h:18,name:'dusk',greek:'ἑσπέρα',pal:['#1F2742','#6B3F69','#C85C4E','#E8A85C'],field:{scale:.016,speed:.00078,angle:1.0}},\n      {h:21,name:'evening',greek:'ἕσπερος',pal:['#141A30','#352A52','#7A4A6A','#B07A78'],field:{scale:.013,speed:.00056,angle:0.4}},\n    ];\n    const hexToRgb=h=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];\n    const mix=(a,b,t)=>[Math.round(a[0]+(b[0]-a[0])*t),Math.round(a[1]+(b[1]-a[1])*t),Math.round(a[2]+(b[2]-a[2])*t)];\n    const rgbStr=c=>'rgb('+c[0]+','+c[1]+','+c[2]+')';\n    function paletteAt(date){\n      const h=date.getHours()+date.getMinutes()/60,n=ANCHORS.length;\n      let bi=ANCHORS.findIndex(a=>a.h>h); if(bi===-1) bi=0;\n      const ai=(bi-1+n)%n,a=ANCHORS[ai],b=ANCHORS[bi];\n      const span=(((b.h-a.h)+24)%24)||24; let t=(((h-a.h)+24)%24)/span; const ts=t*t*(3-2*t);\n      const p=a.pal.map((c,k)=>mix(hexToRgb(c),hexToRgb(b.pal[k]),ts)); const lp=(x,y)=>x+(y-x)*ts;\n      return {pal:p,field:{scale:lp(a.field.scale,b.field.scale),speed:lp(a.field.speed,b.field.speed),angle:lp(a.field.angle,b.field.angle)},greek:(ts<.5?a:b).greek,label:(ts<.5?a:b).name};\n    }\n    const cv=$('cv'); const ctx=cv?cv.getContext('2d'):null;\n    const reduce=window.matchMedia('(prefers-reduced-motion:reduce)').matches;\n    let TILE=14,cols,rows,dpr=Math.min(2,window.devicePixelRatio||1),FIELD=ANCHORS[0].field,ramp;\n    const lerpC=(a,b,t)=>[a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t,a[2]+(b[2]-a[2])*t];\n    function buildRamp(pal,steps){const out=[];for(let i=0;i<steps;i++){const p=i/(steps-1)*(pal.length-1),lo=Math.floor(p),hi=Math.min(pal.length-1,lo+1),f=p-lo;out.push(lerpC(pal[lo],pal[hi],f).map(Math.round));}return out;}\n    ramp=buildRamp(ANCHORS[0].pal.map(hexToRgb),18);\n    function setupCanvas(){ if(!cv) return; const w=window.innerWidth,h=window.innerHeight; cv.width=w*dpr;cv.height=h*dpr;ctx.setTransform(dpr,0,0,dpr,0,0); cols=Math.ceil(w/TILE)+1;rows=Math.ceil(h/TILE)+1; }\n    function field(cx,cy,t){const f=FIELD,wx=Math.cos(f.angle),wy=Math.sin(f.angle);const wave=Math.sin((cx*wx+cy*wy)*f.scale+t*f.speed);const cross=Math.sin((cx*-wy+cy*wx)*f.scale*0.6+t*f.speed*0.7)*0.5;const ripple=Math.sin(cx*f.scale*1.6-cy*f.scale*1.2+t*f.speed*0.4)*0.3;return(((wave+cross+ripple)/1.8)+1)/2;}\n    function draw(t){ if(!ctx) return; const N=ramp.length; for(let y=0;y<rows;y++)for(let x=0;x<cols;x++){const cx=x*TILE,cy=y*TILE;let v=field(cx,cy,t);v=v*0.86+(y/rows)*0.14;v=0.5+(v-0.5)*0.58;let idx=v<0?0:v>=1?N-1:(v*N)|0;ctx.fillStyle=rgbStr(ramp[idx]);ctx.fillRect(cx+0.4,cy+0.4,TILE-1.2,TILE-1.2);} }\n    function recompute(){\n      const d=new Date(),r=paletteAt(d),root=document.documentElement.style;\n      r.pal.forEach((c,i)=>root.setProperty('--c'+i,rgbStr(c))); ramp=buildRamp(r.pal,18); FIELD=r.field;\n      const av=[(r.pal[1][0]+r.pal[2][0]+r.pal[3][0])/3,(r.pal[1][1]+r.pal[2][1]+r.pal[3][1])/3,(r.pal[1][2]+r.pal[2][2]+r.pal[3][2])/3];\n      const lum=0.299*av[0]+0.587*av[1]+0.114*av[2];\n      if(lum>150){root.setProperty('--ink','#22303c');root.setProperty('--ink-dim','#22303ccc');root.setProperty('--ink-faint','#22303c55');root.setProperty('--hi','#0c1620');root.setProperty('--veil',rgbStr(r.pal[3]));}\n      else{root.setProperty('--ink','#F3EFE6');root.setProperty('--ink-dim','#F3EFE6aa');root.setProperty('--ink-faint','#F3EFE655');root.setProperty('--hi','#ffffff');root.setProperty('--veil',rgbStr(r.pal[0]));}\n      setText('phaseName',r.greek);\n      setText('clock', d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})+' · '+r.label);\n      setText('oracleDate', d.toLocaleDateString([],{month:'short',day:'numeric'}));\n    }\n    let rafId=null, motionOn=true;\n    function frame(t){ draw(t); if(motionOn&&!reduce) rafId=requestAnimationFrame(frame); }\n    recompute(); setupCanvas(); if(motionOn&&!reduce) rafId=requestAnimationFrame(frame); else draw(0);\n    const onResize=()=>{ setupCanvas(); if(!(motionOn&&!reduce)) draw(0); renderCharts(); };\n    window.addEventListener('resize',onResize);\n    const iv=setInterval(recompute,60000);\n    function setMotion(on){ motionOn=on; setText('motionMeta',on?'on':'off'); if(on){ if(!rafId&&!reduce) rafId=requestAnimationFrame(frame); } else { if(rafId){cancelAnimationFrame(rafId);rafId=null;} draw(0); } }\n\n    /* ===== moon (astronomy) ===== */\n    function moonInfo(date){ const syn=29.530588853,ref=Date.UTC(2000,0,6,18,14)/86400000,now=date.getTime()/86400000; const age=(((now-ref)%syn)+syn)%syn,phase=age/syn,frac=(1-Math.cos(2*Math.PI*phase))/2; const names=['New moon','Waxing crescent','First quarter','Waxing gibbous','Full moon','Waning gibbous','Last quarter','Waning crescent']; return {phase,frac,waxing:phase<0.5,name:names[Math.floor(phase*8+0.5)%8]}; }\n    function drawMoon(id,size){ const c0=$(id); if(!c0) return moonInfo(new Date()); const d=Math.min(2,window.devicePixelRatio||1); c0.width=size*d;c0.height=size*d; const c=c0.getContext('2d'); c.setTransform(d,0,0,d,0,0); const cx=size/2,cy=size/2,r=size/2-2,mi=moonInfo(new Date()); c.clearRect(0,0,size,size); c.beginPath();c.arc(cx,cy,r,0,2*Math.PI);c.fillStyle='#0e1422';c.fill(); const rx=r*Math.cos(2*Math.PI*mi.phase); c.beginPath();c.fillStyle='#ece6d6'; if(mi.waxing){c.arc(cx,cy,r,-Math.PI/2,Math.PI/2,false);c.ellipse(cx,cy,Math.abs(rx),r,0,Math.PI/2,-Math.PI/2,rx>0);}else{c.arc(cx,cy,r,Math.PI/2,-Math.PI/2,false);c.ellipse(cx,cy,Math.abs(rx),r,0,-Math.PI/2,Math.PI/2,rx<0);} c.closePath();c.fill(); c.beginPath();c.arc(cx,cy,r,0,2*Math.PI);c.strokeStyle='rgba(236,230,214,0.22)';c.lineWidth=1;c.stroke(); return mi; }\n    function renderMoonCard(){ const mi=drawMoon('moonCvC',46); if(mi){ setText('cMoonName',mi.name); setText('cMoonSub',Math.round(mi.frac*100)+'% lit · '+(mi.waxing?'waxing':'waning')); } }\n    function renderMoonDetail(){ const mi=drawMoon('moonCvBig',92),base=new Date(),day=86400000; setText('mdName',mi.name); setText('mdLit',Math.round(mi.frac*100)+'%'); setText('mdLit2',Math.round(mi.frac*100)+'%'); setText('mdPhase',mi.waxing?'waxing':'waning'); let full=null,nw=null; for(let i=1;i<31&&(!full||!nw);i++){ const idx=Math.floor(moonInfo(new Date(base.getTime()+i*day)).phase*8+0.5)%8; if(idx===4&&!full) full=new Date(base.getTime()+i*day); if(idx===0&&!nw) nw=new Date(base.getTime()+i*day); } setText('mdFull',full?full.toLocaleDateString([],{month:'short',day:'numeric'}):'—'); setText('mdNew',nw?nw.toLocaleDateString([],{month:'short',day:'numeric'}):'—'); setText('mdNote', 'A '+mi.name.toLowerCase()+', '+Math.round(mi.frac*100)+'% lit and '+(mi.waxing?'waxing':'waning')+'. Real sky, drawn from tonight\\u2019s date.'); }\n\n    /* ===== charts ===== */\n    function drawLine(c0,color){ if(!c0||!c0.clientWidth) return; const v=(c0.dataset.line||'').split(',').map(Number).filter(x=>!isNaN(x)); if(v.length<2) return; const W=c0.clientWidth,H=c0.clientHeight; c0.width=W*dpr;c0.height=H*dpr; const c=c0.getContext('2d');c.setTransform(dpr,0,0,dpr,0,0); const mn=Math.min(...v),mx=Math.max(...v),rng=(mx-mn)||1,pad=6; const g=c.createLinearGradient(0,0,0,H);g.addColorStop(0,color+'55');g.addColorStop(1,color+'00'); c.beginPath(); v.forEach((y,i)=>{const X=pad+i/(v.length-1)*(W-2*pad),Y=H-pad-((y-mn)/rng)*(H-2*pad);i?c.lineTo(X,Y):c.moveTo(X,Y);}); c.lineTo(W-pad,H-pad);c.lineTo(pad,H-pad);c.closePath();c.fillStyle=g;c.fill(); c.beginPath(); v.forEach((y,i)=>{const X=pad+i/(v.length-1)*(W-2*pad),Y=H-pad-((y-mn)/rng)*(H-2*pad);i?c.lineTo(X,Y):c.moveTo(X,Y);}); c.strokeStyle=color;c.lineWidth=1.8;c.lineJoin='round';c.stroke(); }\n    function renderCharts(){ /* charts are redrawn on demand by openMetric */ }\n\n    /* ===== API ===== */\n    async function api(path,opts){ const r=await fetch(path,Object.assign({headers:{'Content-Type':'application/json'}},opts||{})); if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); }\n    const apiGet=p=>api(p);\n    const apiSend=(p,method,body)=>api(p,{method,body:body!=null?JSON.stringify(body):undefined});\n\n    /* ===== state ===== */\n    let prefs=null, day=null, history=null, insights=null, sources=null, oraclePoll=null, autoOpened=false;\n    const defaultMode=()=> new Date().getHours()<17?'start':'close';\n\n    /* ===== metric config ===== */\n    const METRICS={\n      readiness:{label:'Readiness',gk:'σθένος',field:'readiness',unit:'',fmt:v=>Math.round(v),color:'#9fd6a0'},\n      sleep_hours:{label:'Sleep',gk:'ὕπνος',field:'sleep_hours',unit:'hours',fmt:v=>(+v).toFixed(1),color:'#cdd6e2'},\n      sleep_score:{label:'Sleep score',gk:'ποιότης',field:'sleep_score',unit:'of 100',fmt:v=>Math.round(v),color:'#cdd6e2'},\n      hrv:{label:'HRV',gk:'ῥυθμός',field:'hrv',unit:'ms',fmt:v=>Math.round(v),color:'#cdd6e2'},\n      resting_hr:{label:'Resting HR',gk:'παλμός',field:'resting_hr',unit:'bpm',fmt:v=>Math.round(v),color:'#e0a3a3'},\n      temperature_deviation:{label:'Temp dev',gk:'θέρμη',field:'temperature_deviation',unit:'°C',fmt:v=>(v>0?'+':'')+(+v).toFixed(1),color:'#e8a85c'},\n      steps:{label:'Activity',gk:'βῆμα',field:'steps',unit:'steps',fmt:v=>Math.round(v).toLocaleString(),color:'#9fd6a0'},\n    };\n    const phaseColor={menses:'#C85C4Ecc',follicular:'#4E7E8A99',ovulation:'#E8A85Ccc',luteal:'#6B4A7A99'};\n    const mval=(m,f)=> (m&&m[f]!=null)?m[f]:null;\n\n    /* ===== oracle ===== */\n    function renderOracle(){\n      const kLine=$('kLine'),body=$('oracleBody'),card=$('oracleCard'); if(!body) return; card.classList.remove('generating');\n      if(day===null){ kLine.textContent='Reaching for the day…'; body.innerHTML='<div class=\"loading\">reading the day…<\u002Fdiv>'; return; }\n      if(day==='error'){ kLine.textContent='The day is out of reach.'; body.innerHTML='<div class=\"errline\">Couldn\\u2019t reach Kairos.<button data-retry=\"day\">retry<\u002Fbutton><\u002Fdiv>'; return; }\n      const o=day.oracle||{state:'none'};\n      if(o.state==='ready'){ kLine.textContent=o.title||'—'; const parts=(o.text||'').split(/\\n\\s*\\n/).filter(Boolean); body.innerHTML = parts.length?parts.map((p,i)=>'<p'+(i===0?' class=\"drop\"':'')+'>'+esc(p)+'<\u002Fp>').join(''):'<p class=\"empty\">The reading is empty.<\u002Fp>'; return; }\n      if(o.state==='generating'){ kLine.textContent='The reading is forming…'; body.innerHTML='<div class=\"gen\">Your kairos is being drawn…<\u002Fdiv>'; return; }\n      // none\n      kLine.textContent='The day hasn\\u2019t spoken yet.';\n      body.innerHTML='<p class=\"invite\">Your reading is drawn after you log the day. <button class=\"inlinelink\" data-open=\"checkin\">'+ciVerb()+' &rarr;<\u002Fbutton><\u002Fp>';\n    }\n    async function generateOracle(){\n      try{ const o=await apiSend('/api/day/'+todayKey+'/oracle','POST'); if(day&&typeof day==='object') day.oracle=o; renderOracle(); if(o&&o.state==='generating') pollOracle(); }\n      catch(e){ /* leave current */ }\n    }\n    function pollOracle(){ clearTimeout(oraclePoll); oraclePoll=setTimeout(async()=>{ try{ const d=await apiGet('/api/day/'+todayKey); day=d; renderOracle(); renderStatsTile(); if(d.oracle&&d.oracle.state==='generating') pollOracle(); }catch(e){} },5000); }\n\n    /* ===== stats tile (real metrics) ===== */\n    function fmtHm(h){ const H=Math.floor(h),M=Math.round((h-H)*60); return H+'h'+(M<10?'0'+M:M); }\n    function renderStatsTile(){\n      const el=$('statChips'); if(!el) return;\n      if(day===null){ el.innerHTML='<span class=\"chip\"><b>loading…<\u002Fb><\u002Fspan>'; return; }\n      if(day==='error'){ el.innerHTML='<div class=\"errline\">Metrics unavailable.<button data-retry=\"day\">retry<\u002Fbutton><\u002Fdiv>'; return; }\n      const m=day.metrics||{},chips=[];\n      const chip=(l,v)=>chips.push('<span class=\"chip\">'+l+' <b>'+v+'<\u002Fb><\u002Fspan>');\n      if(m.readiness!=null) chip('readiness',Math.round(m.readiness));\n      if(m.cycle_phase==='menses') chip('period', m.cycle_day!=null?('day '+m.cycle_day):'active');\n      else if(m.cycle_phase!=null) chip('cycle', m.cycle_phase);\n      if(m.sleep_hours!=null) chip('sleep', fmtHm(m.sleep_hours));\n      if(m.hrv!=null) chip('hrv', m.hrv+'ms');\n      if(chips.length<4 && m.resting_hr!=null) chip('rest hr', m.resting_hr);\n      if(chips.length<4 && m.steps!=null) chip('steps', Number(m.steps).toLocaleString());\n      el.innerHTML = chips.length?chips.slice(0,4).join(''):'<span class=\"empty\">No metrics yet.<\u002Fspan>';\n    }\n\n    /* ===== chronos metric cards ===== */\n    function metricCard(key,wide){ const m=METRICS[key],v=day&&day!=='error'?mval(day.metrics,m.field):null; const val=v!=null?m.fmt(v):'—'; return '<div class=\"card tappable'+(wide?' wide':'')+'\" data-metric=\"'+key+'\"><div class=\"stream-head\"><span class=\"label\">'+m.label+'<\u002Fspan><span class=\"chev\">→<\u002Fspan><\u002Fdiv><div class=\"val\">'+val+(m.unit&&['hours','of 100','ms','bpm'].includes(m.unit)&&v!=null?'<small>'+(m.unit==='hours'?'h':m.unit==='of 100'?'':m.unit)+'<\u002Fsmall>':'')+'<\u002Fdiv><\u002Fdiv>'; }\n    function renderChronosCards(){\n      const r=$('grpRecovery'),vi=$('grpVitals'),ac=$('grpActivity'); if(!r) return;\n      r.innerHTML=metricCard('readiness')+metricCard('sleep_hours')+metricCard('sleep_score')+metricCard('hrv');\n      vi.innerHTML=metricCard('resting_hr')+metricCard('temperature_deviation');\n      ac.innerHTML=metricCard('steps',true);\n    }\n\n    /* ===== weather card ===== */\n    function renderWeatherCard(){ const el=$('weatherCardBody'); if(!el) return; const w=(day&&day!=='error'&&day.metrics&&day.metrics.weather)||{}; if(w.temp_c==null&&!w.summary){ el.innerHTML='<div class=\"stream-big\">—<\u002Fdiv><div class=\"stream-meta\">no weather yet<\u002Fdiv>'; return; } el.innerHTML='<div class=\"stream-big\">'+(w.temp_c!=null?w.temp_c+'°':'—')+'<\u002Fdiv><div class=\"stream-meta\">'+esc(w.summary||'—')+(w.daylight_h!=null?(' · '+w.daylight_h+'h light'):'')+'<\u002Fdiv>'; }\n\n    /* ===== ephemeris (history) ===== */\n    let histReadout=null;\n    function ephCellColor(kind,v){ if(v==null) return '#ffffff08'; if(kind==='cycle') return phaseColor[v]||'#ffffff14'; let a; if(kind==='sleep') a=Math.max(.12,Math.min(.92,(v-4)/5)); else if(kind==='readiness') a=Math.max(.12,Math.min(.92,v/100)); else a=Math.max(.12,Math.min(.92,v/12000)); return 'rgba(205,214,226,'+a.toFixed(2)+')'; }\n    function renderEphemeris(){\n      const w=$('ephWrap'); if(!w) return;\n      if(history===null){ w.innerHTML='<div class=\"loading\">loading…<\u002Fdiv>'; return; }\n      if(history==='error'){ w.innerHTML='<div class=\"errline\">History unavailable.<button data-retry=\"history\">retry<\u002Fbutton><\u002Fdiv>'; return; }\n      if(!history.length){ w.innerHTML='<div class=\"empty\">No record yet — your days will appear here as you log them.<\u002Fdiv>'; return; }\n      const days=history.slice(-28);\n      const lane=(label,kind,get)=>{ const cells=days.map((d,i)=>'<div class=\"eph-cell\" data-i=\"'+i+'\" style=\"background:'+ephCellColor(kind,get(d))+'\"><\u002Fdiv>').join(''); return '<div class=\"eph-lane\"><div class=\"ll\">'+label+'<\u002Fdiv><div class=\"eph-track\">'+cells+'<\u002Fdiv><\u002Fdiv>'; };\n      w.innerHTML='<div class=\"eph\">'+\n        lane('Cycle','cycle',d=>mval(d.metrics,'cycle_phase'))+\n        lane('Sleep','sleep',d=>mval(d.metrics,'sleep_hours'))+\n        lane('Readiness','readiness',d=>mval(d.metrics,'readiness'))+\n        lane('Steps','steps',d=>mval(d.metrics,'steps'))+\n        '<div class=\"eph-axis\"><div class=\"ll\"><\u002Fdiv><div class=\"ax\"><span>'+esc(days[0].day)+'<\u002Fspan><span>'+esc(days[days.length-1].day)+'<\u002Fspan><\u002Fdiv><\u002Fdiv>'+\n        '<\u002Fdiv><div class=\"eph-readout\" id=\"ephReadout\">Tap a day to open it.<\u002Fdiv>';\n      const wrap=$('ephWrap');\n      wrap.querySelectorAll('.eph-cell').forEach(c=>{\n        c.addEventListener('mouseover',()=>{ const d=days[+c.dataset.i],m=d.metrics||{}; setText('ephReadout', d.day+'  ·  '+(m.cycle_phase||'—')+'  ·  sleep '+(m.sleep_hours!=null?m.sleep_hours+'h':'—')+'  ·  readiness '+(m.readiness!=null?m.readiness:'—')); });\n        c.addEventListener('click',()=> openDayDetail(days[+c.dataset.i].day));\n      });\n    }\n\n    /* ===== cycle ===== */\n    function phasePct(cd){ return cd!=null?Math.max(2,Math.min(98,Math.round((cd/28)*100))):null; }\n    function renderCycleCard(){\n      const el=$('cycleCardBody'); if(!el) return;\n      if(day===null){ el.innerHTML='<div class=\"loading\">loading…<\u002Fdiv>'; return; }\n      const m=(day&&day!=='error')?day.metrics||{}:{};\n      if(m.cycle_phase==null&&m.cycle_day==null){ el.innerHTML='<div class=\"empty\">No cycle data yet.<\u002Fdiv>'; return; }\n      const pct=phasePct(m.cycle_day);\n      el.innerHTML='<div class=\"phase-bar\"><div class=\"ph menses\" style=\"flex:5\"><\u002Fdiv><div class=\"ph follicular\" style=\"flex:8\"><\u002Fdiv><div class=\"ph ovulation\" style=\"flex:3\"><\u002Fdiv><div class=\"ph luteal\" style=\"flex:12\"><\u002Fdiv>'+(pct!=null?'<div class=\"ph-marker\" style=\"left:'+pct+'%\"><\u002Fdiv>':'')+'<\u002Fdiv><div class=\"phase-bar-labels\"><span>menses<\u002Fspan><span>follicular<\u002Fspan><span>ovulation<\u002Fspan><span>luteal<\u002Fspan><\u002Fdiv><div class=\"cyc-note\">'+(m.cycle_day!=null?('Day '+m.cycle_day+' · '):'')+(m.cycle_phase||'—')+'<\u002Fdiv>';\n    }\n    function renderCycleScreen(){\n      const el=$('cycleBody'); if(!el) return;\n      const m=(day&&day!=='error')?day.metrics||{}:{};\n      const hist=(history&&history!=='error')?history:[];\n      const withCycle=hist.filter(d=>d.metrics&&d.metrics.cycle_phase!=null);\n      if(m.cycle_phase==null&&!withCycle.length){ el.innerHTML='<div class=\"empty\">No cycle data yet. As you log days and your sources sync, your cycle and its phases will appear here.<\u002Fdiv>'; return; }\n      const pct=phasePct(m.cycle_day);\n      let h='<div class=\"metric-hero\"><div class=\"metric-big\">'+(m.cycle_day!=null?m.cycle_day:'—')+'<\u002Fdiv><div class=\"metric-unit\">'+(m.cycle_phase||'—')+'<\u002Fdiv><\u002Fdiv>';\n      h+='<div class=\"phase-bar\" style=\"height:14px\"><div class=\"ph menses\" style=\"flex:5\"><\u002Fdiv><div class=\"ph follicular\" style=\"flex:8\"><\u002Fdiv><div class=\"ph ovulation\" style=\"flex:3\"><\u002Fdiv><div class=\"ph luteal\" style=\"flex:12\"><\u002Fdiv>'+(pct!=null?'<div class=\"ph-marker\" style=\"left:'+pct+'%\"><\u002Fdiv>':'')+'<\u002Fdiv><div class=\"phase-bar-labels\" style=\"margin-bottom:26px\"><span>menses<\u002Fspan><span>follicular<\u002Fspan><span>ovulation<\u002Fspan><span>luteal<\u002Fspan><\u002Fdiv>';\n      h+='<div class=\"day-sec\"><div class=\"h\">Recorded<\u002Fdiv><div class=\"cmp-row\"><span class=\"cmp-k\">Days with cycle data<\u002Fspan><span class=\"cmp-v\"><b>'+withCycle.length+'<\u002Fb><\u002Fspan><\u002Fdiv><\u002Fdiv>';\n      h+='<div class=\"day-sec\"><div class=\"h\">Comparison<\u002Fdiv><div class=\"empty\">Cycle-over-cycle comparisons appear once more than one cycle has been recorded.<\u002Fdiv><\u002Fdiv>';\n      el.innerHTML=h;\n    }\n\n    /* ===== insights ===== */\n    function renderInsights(){\n      const el=$('insights'); if(!el) return;\n      if(insights===null){ el.innerHTML='<div class=\"loading\">loading…<\u002Fdiv>'; return; }\n      if(insights==='error'){ el.innerHTML='<div class=\"errline\">Insights unavailable.<button data-retry=\"insights\">retry<\u002Fbutton><\u002Fdiv>'; return; }\n      if(!insights.length){ el.innerHTML='<div class=\"empty\">Kairos hasn\\u2019t noticed anything yet — patterns will surface here as you log your days.<\u002Fdiv>'; return; }\n      el.innerHTML=insights.map(p=>'<div class=\"insight\"><div class=\"top\"><span class=\"tag\">'+esc(p.since||'pattern')+'<\u002Fspan><\u002Fdiv><div class=\"txt\">'+esc(p.title)+'<\u002Fdiv>'+(p.stat?'<div class=\"stat\">'+esc(p.stat)+'<\u002Fdiv>':'')+(p.detail?'<div class=\"det\">'+esc(p.detail)+'<\u002Fdiv>':'')+'<\u002Fdiv>').join('');\n    }\n\n    /* ===== sources ===== */\n    function renderSourcesScreen(){\n      const el=$('sourcesList'); if(!el) return;\n      if(sources===null){ el.innerHTML='<div class=\"loading\">loading…<\u002Fdiv>'; return; }\n      if(sources==='error'){ el.innerHTML='<div class=\"errline\">Couldn\\u2019t reach sources.<button data-retry=\"sources\">retry<\u002Fbutton><\u002Fdiv>'; return; }\n      if(!sources.length){ el.innerHTML='<div class=\"empty\">No sources configured yet.<\u002Fdiv>'; return; }\n      el.innerHTML=sources.map(s=>'<div class=\"connect-row'+(s.connected?' on':'')+'\" style=\"cursor:default\"><span>'+esc(s.label||s.key)+'<\u002Fspan><span class=\"cr-meta\">'+(s.connected?('connected'+(s.last_seen?(' · '+s.last_seen):'')+(s.count!=null?(' · '+s.count):'')):'not connected')+'<\u002Fspan><\u002Fdiv>').join('');\n    }\n    function renderSrcToggles(){\n      const el=$('srcToggles'); if(!el||!prefs) return; const src=prefs.sources||{};\n      const keys=[['oura','Oura'],['calendar','Calendar'],['spotify','Spotify'],['weather','Weather']];\n      el.innerHTML=keys.map(([k,l])=>'<button class=\"connect-row'+(src[k]?' on':'')+'\" data-src=\"'+k+'\"><span>'+l+'<\u002Fspan><span class=\"cr-meta\">'+(src[k]?'on':'off')+'<\u002Fspan><\u002Fbutton>').join('');\n      const n=Object.values(src).filter(Boolean).length; setText('srcCount', n+' on');\n    }\n    async function toggleSource(k){ if(!prefs) return; prefs.sources=prefs.sources||{}; prefs.sources[k]=!prefs.sources[k]; renderSrcToggles(); try{ prefs=await apiSend('/api/prefs','PUT',prefs); renderSrcToggles(); }catch(e){} }\n\n    /* ===== check-in (dynamic: morning / evening / whole day) ===== */\n    let ciMode='morning';\n    function defaultCiMode(){ const h=new Date().getHours(); if(day&&day!=='error'){ if(!day.morning) return h<17?'morning':'full'; if(!day.evening) return 'evening'; return 'morning'; } return h<17?'morning':'full'; }\n    function ciVerb(){ const m=defaultCiMode(); return m==='morning'?'Begin the day':m==='evening'?'Close the day':'Log the day'; }\n    function renderCiModes(){ const el=$('ciModes'); if(!el) return; el.querySelectorAll('button').forEach(b=>{ const seg=b.dataset.cm; b.classList.toggle('on', seg===ciMode); const filled=(seg==='morning')?(day&&day!=='error'&&day.morning):(seg==='evening')?(day&&day!=='error'&&day.evening):(day&&day!=='error'&&(day.morning||day.evening)); b.textContent=(seg==='morning'?'Morning':seg==='evening'?'Evening':'Whole day')+(filled?' ✓':''); }); }\n    function togglePeriodReveal(){ const el=document.querySelector('#screen-checkin [data-group=\"flow\"]'); const on=el?el.querySelector('button.on'):null; const r=$('periodReveal'); if(r) r.classList.toggle('open', !!on && on.dataset.val!=='none'); }\n    function renderSettingsToday(){ const has=day&&day!=='error'; setText('ciMetaM', has&&day.morning?'logged':'not yet'); setText('ciMetaE', has&&day.evening?'logged':'not yet'); }\n    function updateCue(){ const cue=$('dayCue'),btn=$('dayCueBtn'); if(!cue) return; if(!day||day==='error'){ cue.classList.remove('show'); return; } let label; if(day.morning&&day.evening) label='ἑσπέρα · edit today'; else if(day.morning) label='ἑσπέρα · close the day'; else label=(new Date().getHours()<17?'ὄρθρος · start the day':'ἑσπέρα · log the day'); btn.textContent=label; cue.classList.add('show'); }\n    const getSel=g=>{ const el=document.querySelector('#screen-checkin [data-group=\"'+g+'\"]'); if(!el) return null; if(el.classList.contains('dots')){ const n=el.querySelectorAll('button.on').length; return n||null; } const b=el.querySelector('button.on'); return b?b.dataset.val:null; };\n    const getMulti=g=>{ const out=[]; document.querySelectorAll('#screen-checkin [data-group=\"'+g+'\"]').forEach(el=>el.querySelectorAll('button.on').forEach(b=>out.push(b.dataset.val))); return out; };\n    const setSel=(g,v)=>{ const el=document.querySelector('#screen-checkin [data-group=\"'+g+'\"]'); if(!el||v==null) return; if(el.classList.contains('dots')) el.querySelectorAll('button').forEach(b=>b.classList.toggle('on',+b.dataset.val<=+v)); else el.querySelectorAll('button').forEach(b=>b.classList.toggle('on',b.dataset.val===String(v))); if(g==='flow') togglePeriodReveal(); };\n    const setMulti=(g,vals)=>{ if(!vals) return; vals.forEach(val=>{ let found=false; document.querySelectorAll('#screen-checkin [data-group=\"'+g+'\"]').forEach(el=>el.querySelectorAll('button').forEach(b=>{ if(b.dataset.val===val){b.classList.add('on');found=true;} })); if(!found){ const host=$(g==='symptoms'?'symList':'moodCustom'); if(host){ const b=document.createElement('button'); b.dataset.val=val; b.textContent=val; b.classList.add('on'); host.appendChild(b);} } }); };\n    function clearForm(){ document.querySelectorAll('#screen-checkin button.on').forEach(b=>b.classList.remove('on')); document.querySelectorAll('#screen-checkin textarea').forEach(t=>t.value=''); const exm=$('exMin'); if(exm) exm.value=''; const mc=$('moodCustom'); if(mc) mc.innerHTML=''; const sl=$('symList'); if(sl) sl.innerHTML=''; const pr=$('periodReveal'); if(pr) pr.classList.remove('open'); }\n    function configForm(mode){\n      const L=mode==='morning'?'s':mode==='evening'?'e':'c';\n      document.querySelectorAll('#screen-checkin .field[data-modes]').forEach(f=>{ f.classList.toggle('hide', f.dataset.modes.split(' ').indexOf(L)<0); });\n      setText('ciGk', mode==='morning'?'ὄρθρος':'ἑσπέρα');\n      setText('ciTitle', mode==='morning'?'Start the day':mode==='evening'?'Close the day':'The whole day');\n      setText('noteQ', mode==='morning'?'Intention for today':'Closing note · gratitude');\n      setText('moodQ', mode==='morning'?'Mood':'Mood now');\n      setText('energyQ', mode==='morning'?'Energy':'Energy now');\n      $('ciNote').placeholder = mode==='morning'?'What do you want from today…':'A line to close on…';\n      $('ciSubmit').textContent = (mode==='morning'?'Set the day':mode==='evening'?'Close the day':'Save the day')+' →';\n    }\n    function fillFrom(f){ if(!f) return; Object.keys(f).forEach(k=>{ const val=f[k]; if(Array.isArray(val)) setMulti(k,val); else if(k==='note'){ $('ciNote').value=val; } else if(k==='events'){ $('ciEvents').value=val; } else if(k==='exercise_min'){ $('exMin').value=val; } else setSel(k,val); }); }\n    function openCheckin(seg){ ciMode=seg||defaultCiMode(); clearForm(); renderCiModes(); configForm(ciMode); if(day&&day!=='error'){ if(ciMode==='morning') fillFrom(day.morning); else if(ciMode==='evening') fillFrom(day.evening); else { fillFrom(day.morning); fillFrom(day.evening); } } showScreen('checkin'); }\n    function gather(){ const f={}; document.querySelectorAll('#screen-checkin [data-group]').forEach(g=>{ const fld=g.closest('.field'); if(!fld||fld.classList.contains('hide')) return; const rev=g.closest('.reveal'); if(rev && !rev.classList.contains('open')) return; const grp=g.dataset.group; if(g.classList.contains('chipset')){ f[grp]=getMulti(grp); } else { const v=getSel(grp); if(v!=null) f[grp]=v; } }); [['note','ciNote'],['events','ciEvents']].forEach(([k,id])=>{ const el=$(id),fld=el?el.closest('.field'):null; if(el&&fld&&!fld.classList.contains('hide')&&el.value.trim()) f[k]=el.value.trim(); }); const exm=$('exMin'); if(exm&&!exm.closest('.field').classList.contains('hide')&&exm.value) f.exercise_min=+exm.value; return f; }\n    async function submitCheckin(){\n      const mode=ciMode; const phase=mode==='morning'?'morning':mode==='evening'?'evening':'full';\n      const fields=gather(); showScreen(null); toast('Saving…');\n      try{ const d=await apiSend('/api/day/'+todayKey+'/checkin','POST',{phase,fields}); day=d; renderOracle(); renderStatsTile(); renderChronosCards(); renderWeatherCard(); renderCycleCard(); updateCue(); toast('Saved.'); generateOracle(); }\n      catch(e){ toast('Couldn\\u2019t save — backend unreachable.'); }\n    }\n\n    /* ===== day detail ===== */\n    async function openDayDetail(date){ showScreen('day'); setText('dayTitle', date); setText('dayGk','—'); $('dayBody').innerHTML='<div class=\"loading\">loading…<\u002Fdiv>'; try{ const d=await apiGet('/api/day/'+date); renderDayDetail(d); }catch(e){ $('dayBody').innerHTML='<div class=\"errline\">Couldn\\u2019t load this day.<\u002Fdiv>'; } }\n    function renderDayDetail(d){\n      const dd=new Date(d.day+'T00:00:00'); setText('dayTitle', isNaN(dd)?d.day:dd.toLocaleDateString([],{weekday:'long',month:'long',day:'numeric'}));\n      const m=d.metrics||{}; setText('dayGk', m.cycle_phase?(m.cycle_phase+(m.cycle_day!=null?(' · day '+m.cycle_day):'')):'');\n      const stat=(k,v)=>'<div class=\"day-stat\"><div class=\"k\">'+k+'<\u002Fdiv><div class=\"v\">'+(v==null?'—':v)+'<\u002Fdiv><\u002Fdiv>';\n      const row=(k,v)=> (v==null||v===''||(Array.isArray(v)&&!v.length))?'':'<div class=\"day-row\"><span>'+k+'<\u002Fspan><b>'+(Array.isArray(v)?esc(v.join(' · ')):esc(v))+'<\u002Fb><\u002Fdiv>';\n      let h='<div class=\"day-grid\">'+stat('Sleep',m.sleep_hours!=null?m.sleep_hours+'h':null)+stat('Readiness',mval(m,'readiness'))+stat('HRV',m.hrv!=null?m.hrv+'ms':null)+stat('Rest HR',mval(m,'resting_hr'))+stat('Steps',m.steps!=null?Number(m.steps).toLocaleString():null)+stat('Temp',m.temperature_deviation!=null?((m.temperature_deviation>0?'+':'')+m.temperature_deviation+'°'):null)+'<\u002Fdiv>';\n      const mg=d.morning, ev=d.evening;\n      if(mg){ h+='<div class=\"day-sec\"><div class=\"h\">Morning<\u002Fdiv>'+row('Slept',mg.slept)+row('Mood',mg.mood)+row('Energy',mg.energy!=null?mg.energy+'/5':null)+row('Focus',mg.focus!=null?mg.focus+'/5':null)+row('Flow',mg.flow)+row('Cramps',mg.cramps)+row('Skin',mg.acne)+(mg.note?'<div class=\"day-quote\">“'+esc(mg.note)+'”<\u002Fdiv>':'')+'<\u002Fdiv>'; }\n      if(ev){ h+='<div class=\"day-sec\"><div class=\"h\">Evening<\u002Fdiv>'+row('Day',ev.dayWent)+row('Mood',ev.mood)+row('Energy',ev.energy!=null?ev.energy+'/5':null)+row('Movement',ev.exType)+row('Caffeine',ev.caffeine)+row('Alcohol',ev.alcohol)+(ev.events?'<div class=\"day-quote\">“'+esc(ev.events)+'”<\u002Fdiv>':'')+(ev.note?'<div class=\"day-quote\">“'+esc(ev.note)+'”<\u002Fdiv>':'')+'<\u002Fdiv>'; }\n      if(!mg&&!ev) h+='<div class=\"day-sec\"><div class=\"h\">Logged<\u002Fdiv><div class=\"empty\">No check-in was logged this day.<\u002Fdiv><\u002Fdiv>';\n      const o=d.oracle||{}; if(o.state==='ready'&&(o.title||o.text)) h+='<div class=\"day-sec\"><div class=\"h\">The oracle that day<\u002Fdiv><div class=\"day-oracle\">'+esc(o.title||o.text)+'<\u002Fdiv><\u002Fdiv>';\n      $('dayBody').innerHTML=h;\n    }\n\n    /* ===== metric detail ===== */\n    function openMetric(key){\n      const m=METRICS[key]; if(!m) return; setText('metGk',m.gk); setText('metTitle',m.label); setText('metUnit',m.unit);\n      const today=day&&day!=='error'?mval(day.metrics,m.field):null; setText('metBig', today!=null?m.fmt(today):'—');\n      const hist=(history&&history!=='error')?history:[];\n      const series=hist.map(d=>mval(d.metrics,m.field)).filter(v=>v!=null);\n      const wrap=$('metChartWrap'),stats=$('metStats');\n      if(series.length<2){ wrap.innerHTML='<div class=\"empty\" style=\"margin-bottom:22px\">Not enough history yet to chart '+m.label.toLowerCase()+'. It will fill in as you log days.<\u002Fdiv>'; stats.innerHTML=''; setText('metSays', today!=null?'Today\\u2019s value from your sources.':'No reading yet.'); showScreen('metric'); return; }\n      wrap.innerHTML='<canvas id=\"metChart\" class=\"metric-chart\"><\u002Fcanvas>';\n      const avg=series.reduce((a,b)=>a+b,0)/series.length,mn=Math.min(...series),mx=Math.max(...series);\n      stats.innerHTML='<div class=\"day-stat\"><div class=\"k\">Recorded<\u002Fdiv><div class=\"v\">'+series.length+'d<\u002Fdiv><\u002Fdiv><div class=\"day-stat\"><div class=\"k\">Average<\u002Fdiv><div class=\"v\">'+m.fmt(avg)+'<\u002Fdiv><\u002Fdiv><div class=\"day-stat\"><div class=\"k\">Range<\u002Fdiv><div class=\"v\">'+m.fmt(mn)+'–'+m.fmt(mx)+'<\u002Fdiv><\u002Fdiv>';\n      setText('metSays','Drawn from '+series.length+' recorded day'+(series.length>1?'s':'')+' of your record.');\n      const c0=$('metChart'); if(c0) c0.dataset.line=series.map(v=>(+v).toFixed(2)).join(',');\n      showScreen('metric'); setTimeout(()=>{ const el=$('metChart'); if(el) drawLine(el,m.color); },50);\n    }\n\n    /* ===== screens / nav ===== */\n    function showScreen(name){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('open')); if(name){ const el=$('screen-'+name); if(el){ el.classList.add('open'); el.scrollTop=0; } } }\n    function openScreen(name){ if(name==='checkin'){ openCheckin(); return; } if(name==='weather'){ return; } if(name==='settings'){ renderSrcToggles(); renderSettingsToday(); } if(name==='sources'){ loadSources(); } if(name==='cycle'){ renderCycleScreen(); } if(name==='moondetail'){ renderMoonDetail(); } showScreen(name); }\n    let toastEl=null,toastH=null;\n    function toast(msg){ if(!toastEl){ toastEl=document.createElement('div'); toastEl.className='toast'; document.body.appendChild(toastEl);} toastEl.textContent=msg; toastEl.classList.add('show'); clearTimeout(toastH); toastH=setTimeout(()=>toastEl.classList.remove('show'),2400); }\n\n    /* ===== form control wiring ===== */\n    document.querySelectorAll('#screen-checkin .seg, #screen-checkin .dots').forEach(g=>{ g.addEventListener('click',e=>{ const b=e.target.closest('button'); if(!b) return; const isDots=g.classList.contains('dots'),btns=[...g.querySelectorAll('button')]; if(isDots){ const n=+b.dataset.val; btns.forEach(x=>x.classList.toggle('on',+x.dataset.val<=n)); } else { btns.forEach(x=>x.classList.remove('on')); b.classList.add('on'); } if(g.dataset.group==='flow') togglePeriodReveal(); }); });\n    document.querySelectorAll('#screen-checkin .chipset[data-multi]').forEach(g=>{ g.addEventListener('click',e=>{ const b=e.target.closest('button'); if(b) b.classList.toggle('on'); }); });\n    function wireAdd(inputId,hostId){ const inp=$(inputId),host=$(hostId); if(!inp||!host) return; inp.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); const v=inp.value.trim().toLowerCase(); if(!v) return; const b=document.createElement('button'); b.dataset.val=v; b.textContent=v; b.classList.add('on'); host.appendChild(b); inp.value=''; } }); }\n    wireAdd('moodAdd','moodCustom'); wireAdd('symAdd','symList');\n\n    /* ===== delegated clicks ===== */\n    function onDocClick(e){\n      const rt=e.target.closest('[data-retry]'); if(rt){ retry(rt.dataset.retry); return; }\n      const mc=e.target.closest('[data-metric]'); if(mc){ openMetric(mc.dataset.metric); return; }\n      const cm=e.target.closest('#ciModes button'); if(cm){ openCheckin(cm.dataset.cm); return; }\n      const co=e.target.closest('[data-cmopen]'); if(co){ openCheckin(co.dataset.cmopen); return; }\n      const sr=e.target.closest('[data-src]'); if(sr){ toggleSource(sr.dataset.src); return; }\n      if(e.target.closest('#toggleMotion')){ setMotion(!motionOn); return; }\n      const op=e.target.closest('[data-open]'); if(op){ openScreen(op.dataset.open); return; }\n      const cl=e.target.closest('[data-close]'); if(cl){ showScreen(null); return; }\n    }\n    document.addEventListener('click',onDocClick);\n    const sub=$('ciSubmit'); if(sub) sub.addEventListener('click',submitCheckin);\n\n    /* ===== view toggle ===== */\n    const tBtns=document.querySelectorAll('.switch button'),wired=[];\n    tBtns.forEach(b=>{ const h=()=>{ document.querySelectorAll('.switch button').forEach(x=>x.classList.remove('on')); b.classList.add('on'); document.querySelectorAll('.view').forEach(s=>s.classList.remove('active')); const t=$('view-'+b.dataset.view); if(t) t.classList.add('active'); }; b.addEventListener('click',h); wired.push([b,h]); });\n\n    /* ===== loaders ===== */\n    async function loadPrefs(){ try{ prefs=await apiGet('/api/prefs'); }catch(e){ prefs={sources:{}}; } if(!prefs||typeof prefs!=='object') prefs={sources:{}}; if(!prefs.sources) prefs.sources={}; renderSrcToggles(); }\n    async function loadDay(){ day=null; renderOracle(); renderStatsTile(); try{ day=await apiGet('/api/day/'+todayKey); }catch(e){ day='error'; } renderOracle(); renderStatsTile(); renderChronosCards(); renderWeatherCard(); renderCycleCard(); updateCue(); if(day&&day!=='error'&&day.oracle&&day.oracle.state==='generating') pollOracle(); maybeAutoOpen(); }\n    async function loadHistory(){ history=null; renderEphemeris(); try{ history=await apiGet('/api/history?days=60'); if(!Array.isArray(history)) history=[]; }catch(e){ history='error'; } renderEphemeris(); }\n    async function loadInsights(){ insights=null; renderInsights(); try{ insights=await apiGet('/api/insights'); if(!Array.isArray(insights)) insights=[]; }catch(e){ insights='error'; } renderInsights(); }\n    async function loadSources(){ sources=null; renderSourcesScreen(); try{ sources=await apiGet('/api/sources'); if(!Array.isArray(sources)) sources=[]; }catch(e){ sources='error'; } renderSourcesScreen(); }\n    function retry(what){ if(what==='day') loadDay(); else if(what==='history') loadHistory(); else if(what==='insights') loadInsights(); else if(what==='sources') loadSources(); }\n    function maybeAutoOpen(){ if(autoOpened||!day||day==='error') return; if(!day.morning&&!day.evening){ autoOpened=true; setTimeout(()=>{ if(!document.querySelector('.screen.open')) openCheckin(); },900); } }\n\n    /* ===== boot ===== */\n    renderMoonCard();\n    (async()=>{ await loadPrefs(); loadDay(); loadHistory(); loadInsights(); })();\n\n    this._cleanup=()=>{ if(rafId) cancelAnimationFrame(rafId); clearInterval(iv); clearTimeout(oraclePoll); clearTimeout(toastH); window.removeEventListener('resize',onResize); document.removeEventListener('click',onDocClick); wired.forEach(([b,h])=>b.removeEventListener('click',h)); };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
